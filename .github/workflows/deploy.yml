name: Deploy MeliBoo to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject OpenWeatherMap API key
        run: |
          sed -i "s|openWeatherMapApiKey: 'WEATHERMAP_API_KEY'|openWeatherMapApiKey: '${{ secrets.WEATHERMAP_API_KEY }}'|" src/environments/environment.ts

      - name: Build
        run: npx ng build --base-href /meliboo/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/valmel/browser
